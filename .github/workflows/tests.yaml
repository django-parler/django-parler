name: CI Testing
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test:
    name: "Python ${{ matrix.python }} Django ${{ matrix.django }}"
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 8  # default is max available
      fail-fast: false
      matrix:
        include:
          # Django 4.2 (LTS)
          - django: "4.2"
            python: "3.10"
          - django: "4.2"
            python: "3.11"
          - django: "4.2"
            python: "3.12"
          # Django 5.0
          - django: "5.0"
            python: "3.10"
          - django: "5.0"
            python: "3.11"
          - django: "5.0"
            python: "3.12"
          # Django 5.1
          - django: "5.1"
            python: "3.10"
          - django: "5.1"
            python: "3.11"
          - django: "5.1"
            python: "3.12"
          # Django 5.2
          - django: "5.2"
            python: "3.10"
          - django: "5.2"
            python: "3.11"
          - django: "5.2"
            python: "3.12"
          - django: "5.2"
            python: "3.13"
          # Django 6.0
          - django: "6.0"
            python: "3.12"
          - django: "6.0"
            python: "3.13"

    steps:
      - name: Install gettext
        run: sudo apt-get install -y gettext

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Packages
        run: |
          python -m pip install -U pip
          python -m pip install "Django~=${{ matrix.django }}" codecov -e .[tests]

      - name: Run Tests
        run: |
          echo "Python ${{ matrix.python }} / Django ${{ matrix.django }}"
          coverage run --rcfile=.coveragerc runtests.py
          codecov
        continue-on-error: ${{ contains(matrix.django, '6.0') }}
